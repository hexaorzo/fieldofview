
app = 'fieldofview'
primary_region = 'hkg'

[build]
  builder = 'paas'

[build.args]
  NODE_ENV = 'production'

[env]
  NODE_ENV = 'production'
  # Supabase env vars (manage secrets in Fly dashboard or via flyctl secrets set)

[deploy]
  strategy = 'immediate'



[[services]]
  internal_port = 3000
  processes = ['app']
  protocol = 'tcp'
  auto_stop_machines = "off"
  auto_start_machines = true

[services.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = 'connections'

[[services.tcp_checks]]
  grace_period = '10s'
  interval = '15s'
  timeout = '5s'

[[services.http_checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'get'
  path = '/'
  protocol = 'http'
  timeout = '5s'

[[services.ports]]
  force_https = true
  handlers = ['http']
  port = 80

[[services.ports]]
  handlers = ['tls', 'http']
  port = 443

[[vm]]
  size = 'shared-cpu-1x'
  memory = '768mb'

